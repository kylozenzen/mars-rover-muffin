<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Receipts — Client Approvals Without the Chaos</title>

  <!-- Font preconnect to eliminate render jank -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="toast"></div>

  <div id="app-shell">

    <nav id="desktop-sidebar" style="width:220px;min-width:220px;height:100vh;position:sticky;top:0;background:#0d0f0c;flex-direction:column;padding:24px 12px 20px;overflow-y:auto;">
      <!-- Logo -->
      <div style="display:flex;align-items:center;gap:10px;padding:0 8px;margin-bottom:32px;">
        <div style="width:32px;height:32px;background:#cafd00;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span class="material-symbols-outlined fill-icon" style="font-size:17px;color:#3a4a00">receipt_long</span>
        </div>
        <div>
          <div style="font-family:Space Grotesk,sans-serif;font-size:16px;font-weight:900;color:#f7f6f1;letter-spacing:-0.02em">Receipts</div>
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:rgba(247,246,241,0.3);font-family:Plus Jakarta Sans,sans-serif">The Paper Trail</div>
        </div>
      </div>

      <!-- Nav items -->
      <div style="flex:1;display:flex;flex-direction:column;gap:2px;" id="desktop-nav"></div>

      <!-- Bottom actions -->
      <div style="margin-top:16px;display:flex;flex-direction:column;gap:4px;">
        <button onclick="openHowItWorks()" style="background:transparent;border:none;color:rgba(247,246,241,0.3);font-family:Plus Jakarta Sans,sans-serif;font-size:11px;cursor:pointer;padding:8px;display:flex;align-items:center;gap:6px;border-radius:8px;transition:color 0.15s" class="hs" onmouseover="this.style.color='rgba(247,246,241,0.6)'" onmouseout="this.style.color='rgba(247,246,241,0.3)'">
          <span class="material-symbols-outlined" style="font-size:14px">help_outline</span>How it works
        </button>
        <button onclick="resetDemo()" style="background:transparent;border:none;color:rgba(247,246,241,0.2);font-family:Plus Jakarta Sans,sans-serif;font-size:11px;cursor:pointer;padding:8px;display:flex;align-items:center;gap:6px;border-radius:8px;" class="hs">
          <span class="material-symbols-outlined" style="font-size:14px">refresh</span>Reset
        </button>
      </div>
    </nav>

    <div id="page-content"></div>
  </div>

  <nav id="bottom-nav">
    <button class="nav-tab active" data-nav="dashboard" onclick="setView('dashboard')">
      <div class="nav-icon-wrap"><span class="material-symbols-outlined" style="font-size:18px">home</span></div>
      Home
    </button>
    <button class="nav-tab" data-nav="publisher" onclick="setView('publisher')">
      <div class="nav-icon-wrap"><span class="material-symbols-outlined" style="font-size:18px">send</span></div>
      Publish
    </button>
    <button class="nav-tab" data-nav="deals" onclick="setView('deals')">
      <div class="nav-icon-wrap"><span class="material-symbols-outlined" style="font-size:18px">payments</span></div>
      Deals
    </button>
    <button class="nav-tab" data-nav="more" onclick="openMoreSheet()">
      <div class="nav-icon-wrap"><span class="material-symbols-outlined" style="font-size:18px">more_horiz</span></div>
      More
    </button>
  </nav>

  <form name="beta-waitlist" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="beta-waitlist"/>
    <input type="text" name="bot-field"/>
    <input type="text" name="name"/>
    <input type="email" name="email"/>
  </form>

  <!-- 1. Data -->
  <script src="js/data/demo.js"></script>
  <script src="js/data/copy.js"></script>

  <!-- 2. Core -->
  <script src="js/core/state.js"></script>
  <script src="js/core/utils.js"></script>

  <!-- 3. Components -->
  <script src="js/components/modals.js"></script>
  <script src="js/components/cards.js"></script>
  <script src="js/components/walkthrough.js"></script>

  <!-- 4. Pages -->
  <script src="js/pages/home.js"></script>
  <script src="js/pages/project.js"></script>
  <script src="js/pages/portal.js"></script>
  <script src="js/pages/deals.js"></script>
  <script src="js/pages/publisher.js"></script>

  <!-- 5. Render last -->
  <script src="js/core/render.js"></script>

</body>
</html>
